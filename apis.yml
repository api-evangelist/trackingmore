    description: >-
      TrackingMore provides a unified multi-carrier shipment tracking REST API
      supporting 1,300+ carriers globally. The API enables real-time parcel
      tracking, webhook notifications for shipment status changes, automated
      carrier detection, delivery analytics, and branded tracking page
      customization. Designed for D2C merchants, logistics platforms, and
      ecommerce integrations across Shopify, Amazon, eBay, WooCommerce, and
      Magento.
